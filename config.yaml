source:
  listing_url: "https://www.mutating.com/football-stats/"
  request_delay_seconds: 1.0
  timeout_seconds: 25

recommendations:
  min_score: 60
  rules:
    - id: over_1_5
      label: "Powyżej 1,5 gola"
      enabled: true
      conditions:
        - metric: "Over 1.5 goals"
          aggregation: min
          operator: ">="
          threshold: 70
        - metric: "Goals scored per game"
          aggregation: mean
          operator: ">="
          threshold: 1.25

    - id: over_2_5
      label: "Powyżej 2,5 gola"
      enabled: true
      conditions:
        - metric: "Over 2.5 goals"
          aggregation: mean
          operator: ">="
          threshold: 60
        - metric: "Goals scored per game"
          aggregation: sum
          operator: ">="
          threshold: 2.8

    - id: over_3_5
      label: "Powyżej 3,5 gola"
      enabled: true
      conditions:
        - metric: "Over 3.5 goals"
          aggregation: mean
          operator: ">="
          threshold: 45
        - metric: "Goals scored per game"
          aggregation: sum
          operator: ">="
          threshold: 3.4

    - id: under_2_5
      label: "Poniżej 2,5 gola"
      enabled: true
      conditions:
        - metric: "Under 2.5 goals"
          aggregation: mean
          operator: ">="
          threshold: 60
        - metric: "Goals conceded per game"
          aggregation: sum
          operator: "<="
          threshold: 2.0

    - id: under_3_5
      label: "Poniżej 3,5 gola"
      enabled: true
      conditions:
        - metric: "Under 3.5 goals"
          aggregation: min
          operator: ">="
          threshold: 60

    - id: first_half_over_0_5
      label: "Powyżej 0,5 gola w pierwszej połowie"
      enabled: true
      conditions:
        - metric: "Over 0.5 goals at half-time"
          aggregation: min
          operator: ">="
          threshold: 65

    - id: first_half_over_1_5
      label: "Powyżej 1,5 gola w pierwszej połowie"
      enabled: true
      conditions:
        - metric: "Over 1.5 goals at half-time"
          aggregation: mean
          operator: ">="
          threshold: 40

    - id: btts_yes
      label: "Obie drużyny strzelą — tak"
      enabled: true
      conditions:
        - metric: "Both Teams to Score"
          aggregation: mean
          operator: ">="
          threshold: 55
        - metric: "Team scored"
          aggregation: min
          operator: ">="
          threshold: 70

    - id: btts_no
      label: "Obie drużyny strzelą — nie"
      enabled: true
      conditions:
        - metric: "Both Teams to Score"
          aggregation: mean
          operator: "<="
          threshold: 40
        - metric: "Clean sheets"
          aggregation: max
          operator: ">="
          threshold: 55

    - id: btts_over_2_5
      label: "Obie drużyny strzelą i powyżej 2,5 gola"
      enabled: true
      conditions:
        - metric: "BBTS and Over 2.5"
          aggregation: mean
          operator: ">="
          threshold: 45

    - id: home_scores
      label: "Gospodarze strzelą gola"
      enabled: true
      conditions:
        - metric: "Team scored"
          side: home
          operator: ">="
          threshold: 75

    - id: away_scores
      label: "Goście strzelą gola"
      enabled: true
      conditions:
        - metric: "Team scored"
          side: away
          operator: ">="
          threshold: 75

    - id: home_two_goals
      label: "Gospodarze strzelą co najmniej dwa gole"
      enabled: true
      conditions:
        - metric: "Team scored twice"
          side: home
          operator: ">="
          threshold: 55

    - id: away_two_goals
      label: "Goście strzelą co najmniej dwa gole"
      enabled: true
      conditions:
        - metric: "Team scored twice"
          side: away
          operator: ">="
          threshold: 55

    - id: home_clean_sheet
      label: "Gospodarze bez straty gola"
      enabled: true
      conditions:
        - metric: "Clean sheets"
          side: home
          operator: ">="
          threshold: 55
        - metric: "Team scored"
          side: away
          operator: "<="
          threshold: 65

    - id: away_clean_sheet
      label: "Goście bez straty gola"
      enabled: true
      conditions:
        - metric: "Clean sheets"
          side: away
          operator: ">="
          threshold: 55
        - metric: "Team scored"
          side: home
          operator: "<="
          threshold: 65

    - id: home_win
      label: "Wygrana gospodarzy"
      enabled: true
      conditions:
        - metric: "Win"
          side: home
          operator: ">="
          threshold: 60
        - metric: "Lose"
          side: away
          operator: ">="
          threshold: 30

    - id: draw
      label: "Remis"
      enabled: true
      conditions:
        - metric: "Draw"
          aggregation: mean
          operator: ">="
          threshold: 30

    - id: away_win
      label: "Wygrana gości"
      enabled: true
      conditions:
        - metric: "Win"
          side: away
          operator: ">="
          threshold: 60
        - metric: "Lose"
          side: home
          operator: ">="
          threshold: 30

    - id: home_win_over_1_5
      label: "Wygrana gospodarzy i powyżej 1,5 gola"
      enabled: true
      conditions:
        - metric: "Win and Over 1.5 goals"
          side: home
          operator: ">="
          threshold: 55

    - id: away_win_over_1_5
      label: "Wygrana gości i powyżej 1,5 gola"
      enabled: true
      conditions:
        - metric: "Win and Over 1.5 goals"
          side: away
          operator: ">="
          threshold: 55

    - id: home_leads_half
      label: "Gospodarze prowadzą do przerwy"
      enabled: true
      conditions:
        - metric: "Team win first half"
          side: home
          operator: ">="
          threshold: 50

    - id: away_leads_half
      label: "Goście prowadzą do przerwy"
      enabled: true
      conditions:
        - metric: "Team win first half"
          side: away
          operator: ">="
          threshold: 50

    - id: draw_half
      label: "Remis do przerwy"
      enabled: true
      conditions:
        - metric: "Team draw at half time"
          aggregation: mean
          operator: ">="
          threshold: 40

    - id: home_home
      label: "Gospodarze prowadzą do przerwy i wygrywają mecz"
      enabled: true
      conditions:
        - metric: "Win HT - Win FT"
          side: home
          operator: ">="
          threshold: 40

    - id: away_away
      label: "Goście prowadzą do przerwy i wygrywają mecz"
      enabled: true
      conditions:
        - metric: "Win HT - Win FT"
          side: away
          operator: ">="
          threshold: 40
